<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
    <defs>
        <!-- 배경 그라데이션 -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#050510" />
            <stop offset="40%" stop-color="#0b092a" />
            <stop offset="80%" stop-color="#1b124a" />
            <stop offset="100%" stop-color="#2e1065" />
        </linearGradient>
        
        <!-- 은하수 성운 그라데이션 -->
        <radialGradient id="nebula" cx="70%" cy="30%" r="60%">
            <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25" />
            <stop offset="50%" stop-color="#ec4899" stop-opacity="0.1" />
            <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0" />
        </radialGradient>
        
        <!-- 달 광원 효과 -->
        <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fef08a" stop-opacity="0.4" />
            <stop offset="100%" stop-color="#fef08a" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- 배경 그리기 -->
    <rect width="1200" height="400" fill="url(#bgGrad)" />
    
    <!-- 성운 그리기 -->
    <rect width="1200" height="400" fill="url(#nebula)" />

    <!-- 은하수 미세 은하 별무리 (은하 강물 효과) -->
    <g fill="#ffffff" opacity="0.3">
        <circle cx="800" cy="120" r="1.5" />
        <circle cx="820" cy="110" r="1" />
        <circle cx="840" cy="130" r="2" />
        <circle cx="860" cy="100" r="1" />
        <circle cx="780" cy="140" r="1" />
        <circle cx="760" cy="150" r="1.5" />
        <circle cx="740" cy="160" r="1" />
        <circle cx="720" cy="170" r="2" />
        <circle cx="880" cy="90" r="1" />
        <circle cx="900" cy="80" r="1.5" />
        <circle cx="920" cy="100" r="1" />
        <circle cx="940" cy="70" r="2" />
        <circle cx="960" cy="60" r="1" />
    </g>
    
    <g fill="#fbbf24" opacity="0.4">
        <circle cx="810" cy="115" r="1" />
        <circle cx="835" cy="125" r="1.5" />
        <circle cx="855" cy="95" r="1" />
        <circle cx="770" cy="145" r="1" />
        <circle cx="895" cy="85" r="1" />
        <circle cx="915" cy="95" r="1.5" />
    </g>

    <!-- 밤하늘의 무수한 잔별들 -->
    <g fill="#ffffff">
        <!-- 작고 은은한 별들 -->
        <circle cx="100" cy="80" r="1" opacity="0.6" />
        <circle cx="150" cy="200" r="1.5" opacity="0.8" />
        <circle cx="250" cy="120" r="1" opacity="0.5" />
        <circle cx="300" cy="300" r="1.5" opacity="0.7" />
        <circle cx="450" cy="150" r="1" opacity="0.4" />
        <circle cx="520" cy="90" r="1.5" opacity="0.9" />
        <circle cx="600" cy="250" r="1" opacity="0.6" />
        <circle cx="680" cy="110" r="1.5" opacity="0.8" />
        <circle cx="750" cy="320" r="1" opacity="0.5" />
        <circle cx="1050" cy="140" r="1.5" opacity="0.9" />
        <circle cx="1100" cy="280" r="1" opacity="0.4" />
        <circle cx="1150" cy="100" r="1.5" opacity="0.7" />
        
        <!-- 중간 크기의 별들 -->
        <circle cx="80" cy="250" r="2" opacity="0.9" />
        <circle cx="220" cy="70" r="2" opacity="0.7" />
        <circle cx="380" cy="220" r="2" opacity="0.8" />
        <circle cx="490" cy="310" r="2" opacity="0.9" />
        <circle cx="630" cy="60" r="2" opacity="0.6" />
        <circle cx="980" cy="240" r="2" opacity="0.8" />
        <circle cx="1070" cy="70" r="2" opacity="0.9" />
    </g>

    <!-- 반짝이는 성좌 (Constellation Lines & Nodes) -->
    <g stroke="#ffffff" stroke-width="0.5" opacity="0.3" fill="none">
        <polyline points="180,100 240,140 280,110 340,160" />
        <polyline points="950,250 1010,210 1060,240 1090,190" />
        <polyline points="450,80 500,120 560,110 590,60" />
    </g>
    <g fill="#fef08a">
        <circle cx="180" cy="100" r="3" />
        <circle cx="240" cy="140" r="3.5" />
        <circle cx="280" cy="110" r="3" />
        <circle cx="340" cy="160" r="4" />
        
        <circle cx="950" cy="250" r="3" />
        <circle cx="1010" cy="210" r="3.5" />
        <circle cx="1060" cy="240" r="3" />
        <circle cx="1090" cy="190" r="4" />

        <circle cx="450" cy="80" r="3" />
        <circle cx="500" cy="120" r="3.5" />
        <circle cx="560" cy="110" r="3" />
        <circle cx="590" cy="60" r="4" />
    </g>

    <!-- 신비로운 황금빛 초승달 (Crescent Moon) -->
    <!-- 달 광원 후광 -->
    <circle cx="600" cy="160" r="70" fill="url(#moonGlow)" />
    
    <!-- 달 본체 -->
    <path d="M 580,120 A 45,45 0 0,0 620,200 A 42,42 0 0,1 580,120" fill="#fef08a" opacity="0.95" filter="drop-shadow(0px 0px 10px rgba(254, 240, 138, 0.6))" />

    <!-- 전통 기하학적 나침반/만세력 프레임 데코 (양측 사이드) -->
    <g stroke="#fbbf24" stroke-width="0.75" opacity="0.2" fill="none">
        <circle cx="600" cy="160" r="100" />
        <circle cx="600" cy="160" r="105" stroke-dasharray="5,5" />
        <line x1="600" y1="45" x2="600" y2="275" />
        <line x1="485" y1="160" x2="715" y2="160" />
    </g>

    <!-- 포근한 안개 효과 (바닥 그라데이션) -->
    <rect y="320" width="1200" height="80" fill="url(#bgGrad)" opacity="0.8" />
</svg>
